name: OpenCode Agent

on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  opencode:
    runs-on: ubuntu-latest

    # Only run when explicitly invoked
    if: |
      (
        github.event_name == 'issues' &&
        (
          contains(github.event.issue.body, '/oc') ||
          contains(github.event.issue.body, '/opencode') ||
          contains(github.event.issue.title, '/oc') ||
          contains(github.event.issue.title, '/opencode')
        )
      ) ||
      (
        github.event_name == 'issue_comment' &&
        (
          contains(github.event.comment.body, '/oc') ||
          contains(github.event.comment.body, '/opencode')
        )
      ) ||
      (
        github.event_name == 'pull_request_review_comment' &&
        (
          contains(github.event.comment.body, '/oc') ||
          contains(github.event.comment.body, '/opencode')
        )
      )

    steps:
      - name: Check user permissions (owner or contributor only)
        uses: actions/github-script@v7
        with:
          script: |
            const username = context.actor;

            const perm = await github.rest.repos.getCollaboratorPermissionLevel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              username
            });

            const level = perm.data.permission;

            const allowed = ["admin", "write", "maintain"];

            if (!allowed.includes(level)) {
              core.setFailed(`User ${username} is not authorized (permission: ${level})`);
            }

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 👀 Reaction to whichever event triggered execution
      - name: React 👀 to trigger
        uses: actions/github-script@v7
        with:
          script: |
            const reaction = "eyes";

            if (context.eventName === "issues") {
              await github.rest.reactions.createForIssue({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.issue.number,
                content: reaction
              });
            }

            if (context.eventName === "issue_comment") {
              await github.rest.reactions.createForIssueComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: context.payload.comment.id,
                content: reaction
              });
            }

            if (context.eventName === "pull_request_review_comment") {
              await github.rest.reactions.createForPullRequestReviewComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: context.payload.comment.id,
                content: reaction
              });
            }

      - name: Run OpenCode (free model)
        uses: anomalyco/opencode/github@latest
        with:
          model: opencode/qwen-3.6-plus
          prompt: |
            You are an autonomous software engineering agent.

            You are running inside a GitHub Actions sandbox.

            IMPORTANT RULES:

            1. Only act if explicitly invoked via /oc or /opencode
            2. Use ONLY the triggering issue or comment as the task source
            3. Do not process unrelated issues or repo context beyond necessity
            4. Keep changes minimal and safe
            5. Run tests if available
            6. Create a branch and open a PR

            TASK:
            Implement the request described in the triggering event.
